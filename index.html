<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Aanya</title>
    <!-- Premium Font Integration for Key Visual Highlights -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Smooth breathing multi-tone velvet background */
            background: linear-gradient(135deg, #0f020a, #000000, #1c0514, #000000);
            background-size: 400% 400%;
            animation: breathingGradient 14s ease infinite;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes breathingGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ROMANTIC AMBIENT BACKGROUND EFFECTS --- */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -20px;
            color: rgba(255, 105, 180, 0.25);
            font-size: 1.2rem;
            animation: floatUp 7s linear infinite;
            filter: drop-shadow(0 0 5px rgba(255, 20, 147, 0.3));
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-105dvh) translateX(var(--wobble)) rotate(360deg); opacity: 0; }
        }

        /* --- HIGH END GLASSMORPHISM LOCK SCREEN --- */
        #lockScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        }

        #lockScreen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .lock-content {
            width: 88%;
            max-width: 380px;
            text-align: center;
            padding: 35px 25px;
            z-index: 12;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 148, 184, 0.15);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.08);
            transition: all 0.5s ease;
        }

        .lock-content h2 {
            font-size: 1rem;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            color: #ffb3c1;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 179, 193, 0.3);
            transition: opacity 0.3s ease;
        }

        .input-wrapper {
            position: relative;
            margin: 0 auto;
            width: 100%;
            transition: opacity 0.4s ease;
        }

        .password-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 105, 180, 0.3);
            color: #fff;
            font-size: 1.6rem;
            text-align: center;
            padding: 12px;
            letter-spacing: 4px;
            font-family: monospace;
            outline: none;
            transition: all 0.4s;
            -webkit-appearance: none;
            border-radius: 0;
        }

        .password-input:focus {
            border-color: #ff69b4;
            text-shadow: 0 0 8px #ff69b4;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.15);
        }

        .hint {
            font-size: 0.75rem;
            color: #888;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 12px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Stage 2 Button */
        #stage2 {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }

        .success-text {
            color: #ffb3c1;
            font-size: 1.1rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 179, 193, 0.5);
        }

        .unlock-btn {
            background: linear-gradient(135deg, #ff69b4, #db7093);
            border: none;
            color: white;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            font-family: monospace;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
        }

        .unlock-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(255, 105, 180, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MAIN VIEW GRID --- */
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            z-index: 5;
            padding: 10px 15px;
        }

        .container.show {
            opacity: 1;
        }

        .tree-container {
            width: 100%;
            height: 40dvh; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            position: relative;
        }

        .tree-container::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .message-box {
            width: 100%;
            max-width: 450px;
            height: 52dvh;
            padding: 10px 12px 30px 12px;
            font-size: 0.98rem;
            line-height: 1.65;
            font-weight: bold;
            text-align: left;
            word-wrap: break-word;
            overflow-y: auto; 
            scroll-behavior: smooth;
            scrollbar-width: none; 
            position: relative;
            z-index: 6;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }

        .message-box::-webkit-scrollbar {
            display: none; 
        }

        .highlight-name {
            font-family: 'Great Vibes', cursive;
            font-size: 1.65rem;
            color: #ffb3c1;
            text-shadow: 0 0 12px rgba(255, 179, 193, 0.6);
            font-weight: normal;
            display: inline-block;
            vertical-align: middle;
        }

        .highlight-word {
            color: #ff69b4;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.5);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #ff69b4;
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @media (min-width: 769px) {
            .container {
                flex-direction: row; 
                justify-content: space-around;
                padding: 50px;
            }

            .tree-container {
                width: 50%;
                height: 85dvh;
                margin-top: 0;
            }

            .message-box {
                width: 45%;
                height: auto;
                font-size: 1.25rem;
                line-height: 1.75;
            }
            .highlight-name {
                font-size: 2.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Audio Element - Cinematic Ambient Music -->
    <audio id="bgMusic" loop src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3"></audio>

    <div class="page-wrapper">
        <!-- Ambient Floating Hearts Overlay -->
        <div class="ambient-bg" id="ambientBg"></div>

        <!-- TWO-STAGE LOCK SCREEN -->
        <div id="lockScreen">
            <div class="lock-content" id="lockBox">
                <h2 id="lockTitle">ENTER THE PASSWORD TO UNLOCK<br>YOUR BIRTHDAY GIFT 🎁</h2>
                
                <!-- STAGE 1: Password Input -->
                <div id="stage1" class="input-wrapper">
                    <input type="password" inputmode="numeric" id="passwordField" class="password-input" placeholder="••••••••" maxlength="8" autocomplete="off">
                    <div class="hint">Hint: date of birth (DDMMYYYY)</div>
                    <div id="errorField" class="error-msg">Incorrect password, try 27062010 as password ❤️</div>
                </div>

                <!-- STAGE 2: Open Gift Button -->
                <div id="stage2" class="input-wrapper">
                    <div class="success-text">Password Verified! ✔️</div>
                    <button id="unlockBtn" class="unlock-btn">Open Gift 💝</button>
                </div>

            </div>
        </div>

        <!-- Main Card Interface Component -->
        <div class="container" id="mainCard">
            <div class="tree-container">
                <canvas id="treeCanvas"></canvas>
            </div>

            <div class="message-box" id="messageBox">
                <span id="text"></span><span class="cursor">&nbsp;</span>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_DOB = "27062010"; 

        const lockScreen = document.getElementById('lockScreen');
        const lockTitle = document.getElementById('lockTitle');
        const stage1 = document.getElementById('stage1');
        const stage2 = document.getElementById('stage2');
        const passwordField = document.getElementById('passwordField');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorField = document.getElementById('errorField');
        const mainCard = document.getElementById('mainCard');
        const ambientBg = document.getElementById('ambientBg');
        const bgMusic = document.getElementById('bgMusic');
        
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const textElement = document.getElementById('text');
        const messageBox = document.getElementById('messageBox');

        const width = 500;
        const height = 600;
        canvas.width = width;
        canvas.height = height;

        const messageLines = [
            "Happiest Birthday, Aanya! 🎂🎉✨\n\n",
            "Wishing you a day as bright, beautiful, and wonderful as you are! 🌸💫\n\n",
            "You are genuinely the most beautiful soul and a truly magnificent person by heart ❤️, aur sach kahu toh, mere paas words nahi hai yeh batane ke liye ki tu mere liye kitni zyada special hai. 🥰💞\n\n",
            "I feel incredibly lucky just to have you in my life... honestly, having tu close to me and sharing this beautiful bond is the absolute best thing that has ever happened to me! 🪐✨\n\n",
            "On your special day, I wish you nothing but the most magical moments—exactly the way your heart desires. 🌟🔮 May that priceless, radiant smile of yours always stay lit and never fade away. 😊💕\n\n",
            "I deeply cherish the bond we share more than words can express, aur tujhse baat kiye bina toh mera din bilkul adhoora sa lagta hai. 🥺⏳\n\n",
            "Waise, mujhe teri choti-choti baatein sunna aur tere sath haste rehna bohot accha lagta hai, so I hope you know how much your presence is truly valued. 😜✨\n\n",
            "May God always bless you, protect you, and grant you everything you ever dream of, with endless success, happiness, and peace. 👑🚀\n\n",
            "Keep rising, shining, and bringing so much warmth into the world just by being exactly who you are. 🕊️✨\n\n",
            "With all my love, deepest respect, and a heart full of gratitude... Happy Birthday once again, my absolute favorite human! ❤️🌹✨"
        ];

        const hearts = [];
        const fallingHearts = []; 
        const goldDust = [];
        const mouseTrail = [];
        
        let isUnlocked = false;
        let treeScale = 0; 
        let typedBuffer = ""; 

        const heartColors = [
            'rgba(255, 105, 180, ', 'rgba(255, 20, 147, ', 'rgba(255, 192, 203, ',
            'rgba(255, 69, 0, ', 'rgba(255, 165, 0, ', 'rgba(219, 112, 147, '
        ];

        let mouse = { x: null, y: null };

        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            mouse.x = ((clientX - rect.left) / rect.width) * width;
            mouse.y = ((clientY - rect.top) / rect.height) * height;

            if (isUnlocked && mouse.x !== null && mouse.y !== null) {
                for(let i=0; i<2; i++) {
                    mouseTrail.push({
                        x: mouse.x,
                        y: mouse.y,
                        size: Math.random() * 2.5 + 1.5,
                        alpha: 1,
                        velX: (Math.random() - 0.5) * 2.5,
                        velY: (Math.random() - 0.5) * 2.5,
                        color: `rgba(255, ${Math.floor(Math.random() * 90 + 140)}, 190, `
                    });
                }
            }
        }

        window.addEventListener('mousemove', getCanvasMousePos);
        window.addEventListener('touchmove', getCanvasMousePos, { passive: true });
        
        const resetMouse = () => { mouse.x = null; mouse.y = null; };
        window.addEventListener('mouseleave', resetMouse);
        window.addEventListener('touchend', resetMouse);

        function spawnAmbientBackgroundHeart() {
            if(!isUnlocked) return;
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 12 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
            heart.style.setProperty('--wobble', (Math.random() * 80 - 40) + 'px');
            
            ambientBg.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }

        function drawHeart(ctx, x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x - size / 2, y - size / 2, x - size, y + size / 3, x, y + size);
            ctx.bezierCurveTo(x + size, y + size / 3, x + size / 2, y - size / 2, x, y);
            ctx.fill();
        }

        function initHearts() {
            for (let i = 0; i < 460; i++) {
                const t = Math.PI * 2 * Math.random();
                const scaleX = 11.0;
                const scaleY = -10.0; 
                
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                const densityFactor = Math.random();
                hx *= densityFactor * scaleX;
                hy *= densityFactor * scaleY;

                const targetX = (width / 2) + hx + (Math.random() * 16 - 8);
                const targetY = (height / 2 - 50) + hy + (Math.random() * 16 - 8);

                hearts.push({
                    targetX: targetX,
                    targetY: targetY,
                    x: width / 2,
                    y: height - 180,
                    size: Math.random() * 6.5 + 5.5,
                    color: heartColors[Math.floor(Math.random() * heartColors.length)],
                    alpha: Math.random() * 0.4 + 0.6,
                    speed: Math.random() * 0.025 + 0.01,
                    angle: Math.random() * Math.PI,
                    offsetX: 0,
                    offsetY: 0,
                    growth: 0 
                });
            }

            for (let i = 0; i < 100; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 145;
                goldDust.push({
                    x: width / 2 + Math.cos(angle) * radius,
                    y: (height / 2 - 50) + Math.sin(angle) * radius * 0.85,
                    size: Math.random() * 1.8 + 0.6,
                    speed: Math.random() * 0.02 + 0.006,
                    phase: Math.random() * Math.PI
                });
            }
        }

        function animateTree() {
            ctx.clearRect(0, 0, width, height);

            if (isUnlocked && treeScale < 1) {
                treeScale += 0.015;
            }
            let currentScale = isUnlocked ? treeScale : 0.8;

            ctx.fillStyle = '#ffb3c1'; 
            ctx.beginPath();
            ctx.moveTo(width / 2 - 8, height);
            ctx.quadraticCurveTo(width / 2 - 5, height - 100, width / 2 - 2, height - 180);
            ctx.lineTo(width / 2 + 2, height - 180);
            ctx.quadraticCurveTo(width / 2 + 5, height - 100, width / 2 + 8, height);
            ctx.closePath();
            ctx.fill();

            for(let i = 0; i < goldDust.length; i++) {
                let g = goldDust[i];
                g.phase += g.speed;
                let sparkleAlpha = (Math.sin(g.phase) * 0.45 + 0.55) * (isUnlocked ? 1 : 0.4);
                
                let drawGX = width / 2 + (g.x - width / 2) * currentScale;
                let drawGY = (height / 2 - 50) + (g.y - (height / 2 - 50)) * currentScale;

                ctx.fillStyle = `rgba(255, 215, 0, ${sparkleAlpha})`;
                ctx.beginPath();
                ctx.arc(drawGX, drawGY, g.size, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < hearts.length; i++) {
                const p = hearts[i];
                p.angle += p.speed;

                if (isUnlocked) {
                    p.x += (p.targetX - p.x) * 0.05;
                    p.y += (p.targetY - p.y) * 0.05;
                    if (p.growth < 1) p.growth += 0.02;

                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = p.x - mouse.x;
                        const dy = p.y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = 75; 

                        if (dist < maxDist) {
                            const force = (maxDist - dist) / maxDist;
                            p.offsetX += (dx / dist) * force * 3.5 - p.offsetX * 0.1;
                            p.offsetY += (dy / dist) * force * 3.5 - p.offsetY * 0.1;
                        } else {
                            p.offsetX *= 0.92;
                            p.offsetY *= 0.92;
                        }
                    } else {
                        p.offsetX *= 0.92;
                        p.offsetY *= 0.92;
                    }
                } else {
                    p.x += (p.targetX - p.x) * 0.05;
                    p.y += (p.targetY - p.y) * 0.05;
                    if (p.growth < 1) p.growth += 0.02;
                    p.offsetX = Math.sin(p.angle * 0.5) * 1.5;
                    p.offsetY = Math.cos(p.angle * 0.5) * 0.8;
                }

                const dynamicSize = (p.size + Math.sin(p.angle) * 1.2) * p.growth;
                const currentAlpha = p.alpha + Math.sin(p.angle) * 0.08;

                let drawX = width / 2 + (p.x + p.offsetX - width / 2) * currentScale;
                let drawY = (height / 2 - 50) + (p.y + p.offsetY - (height / 2 - 50)) * currentScale;

                ctx.fillStyle = p.color + currentAlpha + ')';
                drawHeart(ctx, drawX, drawY, dynamicSize * currentScale);

                if (isUnlocked && p.growth >= 1 && Math.random() < 0.0005 && fallingHearts.length < 20) {
                    fallingHearts.push({
                        x: p.x + p.offsetX,
                        y: p.y + p.offsetY,
                        size: p.size * 0.65,
                        color: p.color,
                        alpha: p.alpha,
                        velX: -Math.random() * 1.2 - 0.4, 
                        velY: Math.random() * 0.8 + 0.4,
                        wobbleSpeed: Math.random() * 0.04 + 0.02,
                        wobble: Math.random() * Math.PI
                    });
                }
            }

            for (let i = fallingHearts.length - 1; i >= 0; i--) {
                const fh = fallingHearts[i];
                fh.wobble += fh.wobbleSpeed;
                fh.x += fh.velX + Math.sin(fh.wobble) * 0.4;
                fh.y += fh.velY;
                fh.alpha -= 0.005;

                if (fh.alpha <= 0 || fh.y > height || fh.x < 0) {
                    fallingHearts.splice(i, 1);
                } else {
                    ctx.fillStyle = fh.color + fh.alpha + ')';
                    drawHeart(ctx, fh.x, fh.y, fh.size);
                }
            }

            for (let i = mouseTrail.length - 1; i >= 0; i--) {
                let mt = mouseTrail[i];
                mt.x += mt.velX;
                mt.y += mt.velY;
                mt.alpha -= 0.03;
                if (mt.alpha <= 0) {
                    mouseTrail.splice(i, 1);
                } else {
                    ctx.fillStyle = mt.color + mt.alpha + ')';
                    ctx.beginPath();
                    ctx.arc(mt.x, mt.y, mt.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(animateTree);
        }

        function startTyping(textArray, charIndex = 0, lineIndex = 0) {
            if (lineIndex < textArray.length) {
                let currentLine = textArray[lineIndex];
                
                if (charIndex < currentLine.length) {
                    const char = currentLine.codePointAt(charIndex) > 0xffff ? currentLine.substr(charIndex, 2) : currentLine[charIndex];
                    typedBuffer += char;
                    
                    let dynamicFormattedHtml = typedBuffer.replace(/\n/g, '<br>')
                        .replace(/Aanya/g, '<span class="highlight-name">Aanya</span>')
                        .replace(/(special|favorite human|beautiful bond|lucky|cherish)/gi, '<span class="highlight-word">$1</span>');
                                               
                    textElement.innerHTML = dynamicFormattedHtml;
                    messageBox.scrollTop = messageBox.scrollHeight;

                    setTimeout(() => {
                        startTyping(textArray, charIndex + char.length, lineIndex);
                    }, 55); 
                } else {
                    setTimeout(() => {
                        startTyping(textArray, 0, lineIndex + 1);
                    }, 400);
                }
            }
        }

        // STAGE 1 LOGIC: Auto-verify on 8th digit and reveal Stage 2
        passwordField.addEventListener('input', () => {
            errorField.style.opacity = '0';
            
            if (passwordField.value.length === 8) {
                if (passwordField.value === CORRECT_DOB) {
                    // Password is correct, swap stages gracefully
                    passwordField.blur(); // Collapse mobile keyboard automatically
                    stage1.style.display = 'none';
                    stage2.style.display = 'block';
                    lockTitle.innerHTML = "GIFT UNLOCKED!<br>READY FOR YOU ✨";
                } else {
                    errorField.style.opacity = '1';
                    passwordField.value = '';
                }
            }
        });

        // STAGE 2 LOGIC: Button click unlocks card and securely plays audio
        unlockBtn.addEventListener('click', () => {
            isUnlocked = true; 
            lockScreen.classList.add('hide');
            mainCard.classList.add('show');
            
            // Audio plays flawlessly due to direct user click
            bgMusic.volume = 0.45;
            bgMusic.play().catch(err => console.log("Audio load error context:", err));
            
            setInterval(spawnAmbientBackgroundHeart, 400);
            
            setTimeout(() => {
                startTyping(messageLines);
            }, 800);
        });

        initHearts();
        animateTree();
    </script>
</body>
</html>
