<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Aanya</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f020a, #000000, #1c0514, #000000);
            background-size: 400% 400%; animation: breathingGradient 14s ease infinite;
            color: #fff; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; height: 100vh; height: 100dvh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none;
        }
        @keyframes breathingGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- LOCK SCREEN (PRESERVED DESIGN) --- */
        #lockScreen {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 10;
            transition: opacity 1s;
        }
        .lock-content {
            width: 88%; max-width: 380px; text-align: center; padding: 35px 25px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 148, 184, 0.15);
            border-radius: 24px; box-shadow: 0 15px 35px rgba(255, 105, 180, 0.08);
        }
        .lock-content h2 { font-size: 1rem; margin-bottom: 25px; letter-spacing: 1.5px; color: #ffb3c1; }
        .password-input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(255, 105, 180, 0.3);
            color: #fff; font-size: 1.6rem; text-align: center; padding: 12px;
            letter-spacing: 4px; font-family: monospace; outline: none;
        }
        .hint { font-size: 0.75rem; color: #888; margin-top: 12px; }
        .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 12px; opacity: 0; }
        .unlock-btn {
            background: linear-gradient(135deg, #ff69b4, #db7093); border: none; color: white;
            padding: 14px 28px; font-size: 1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
        }
        #stage2 { display: none; }

        /* --- ENVELOPE SCREEN --- */
        #envelopeScreen { 
            position: absolute; z-index: 8; display: none; 
            flex-direction: column; align-items: center;
        }
        .env-wrapper { position: relative; width: 200px; height: 140px; cursor: pointer; perspective: 1000px; }
        .env-back { position: absolute; width: 100%; height: 100%; background: #d45b84; border-radius: 8px; }
        .env-flap-top { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ff8ab8; clip-path: polygon(0 0, 100% 0, 50% 55%); 
            transform-origin: top; transition: transform 0.6s; z-index: 5;
        }
        .env-wrapper.open .env-flap-top { transform: rotateX(180deg); }
        .seal { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #d90429; border-radius: 50%; z-index: 6; display: flex; align-items: center; justify-content: center; }

        /* --- MAIN CARD (EXISTING) --- */
        #mainCard { opacity: 0; transition: opacity 1s; z-index: 5; display: flex; flex-direction: column; align-items: center; }
        #mainCard.show { opacity: 1; }
        .tree-container { width: 100%; height: 40dvh; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; height: auto; }
        .message-box { width: 90%; max-width: 450px; text-align: center; }
        .highlight-name { font-family: 'Great Vibes', cursive; font-size: 1.6rem; color: #ffb3c1; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-content">
            <h2 id="lockTitle">ENTER THE PASSWORD TO UNLOCK<br>YOUR BIRTHDAY GIFT 🎁</h2>
            <div id="stage1">
                <input type="password" inputmode="numeric" id="passwordField" class="password-input" placeholder="••••••••" maxlength="8">
                <div class="hint">Hint: date of birth (DDMMYYYY)</div>
                <div id="errorField" class="error-msg">Incorrect password ❤️</div>
            </div>
            <div id="stage2">
                <div style="margin-bottom: 20px; color: #ffb3c1;">Password Verified! ✔️</div>
                <button id="unlockBtn" class="unlock-btn">Open Gift 💝</button>
            </div>
        </div>
    </div>

    <div id="envelopeScreen">
        <div class="env-wrapper" id="envelope">
            <div class="env-back"></div>
            <div class="env-flap-top"><div class="seal">❤️</div></div>
        </div>
        <p style="margin-top: 20px; color: #ffb3c1;">Tap the envelope</p>
    </div>

    <div id="mainCard">
        <div class="tree-container"><canvas id="treeCanvas"></canvas></div>
        <div class="message-box" id="messageBox">
            <span id="text"></span><span class="cursor"></span>
        </div>
    </div>

    <script>
        const CORRECT_DOB = "27062010"; 
        const passwordField = document.getElementById('passwordField');
        const lockScreen = document.getElementById('lockScreen');
        const stage1 = document.getElementById('stage1');
        const stage2 = document.getElementById('stage2');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorField = document.getElementById('errorField');
        const envelopeScreen = document.getElementById('envelopeScreen');
        const envelope = document.getElementById('envelope');
        const mainCard = document.getElementById('mainCard');
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const textElement = document.getElementById('text');
        
        // Password Check
        passwordField.addEventListener('input', () => {
            if (passwordField.value.length === 8) {
                if (passwordField.value === CORRECT_DOB) {
                    stage1.style.display = 'none';
                    stage2.style.display = 'block';
                } else {
                    errorField.style.opacity = '1';
                    passwordField.value = '';
                }
            }
        });

        // Trigger Envelope
        unlockBtn.addEventListener('click', () => {
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                envelopeScreen.style.display = 'flex';
            }, 1000);
        });

        // Envelope Animation
        envelope.addEventListener('click', () => {
            envelope.classList.add('open');
            setTimeout(() => {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                setTimeout(() => {
                    envelopeScreen.style.display = 'none';
                    mainCard.classList.add('show');
                    // Start your tree logic here...
                }, 1000);
            }, 600);
        });

        // (Note: Retain all your existing tree/typing script logic below this point)
        // Ensure 'isUnlocked' becomes true when mainCard shows.
    </script>
</body>
</html>
