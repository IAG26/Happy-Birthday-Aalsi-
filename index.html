<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Aanya</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1a0510 0%, #000000 80%);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .page-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ROMANTIC AMBIENT BACKGROUND EFFECTS --- */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -20px;
            color: rgba(255, 105, 180, 0.25);
            font-size: 1.2rem;
            animation: floatUp 7s linear infinite;
            filter: drop-shadow(0 0 5px rgba(255, 20, 147, 0.3));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-105dvh) translateX(var(--wobble)) rotate(360deg);
                opacity: 0;
            }
        }

        /* --- LOCK SCREEN INTERFACE --- */
        #lockScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        #lockScreen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .lock-content {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            z-index: 12;
        }

        .lock-content h2 {
            font-size: 1.1rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: #ffb3c1;
            line-height: 1.6;
        }

        .input-wrapper {
            position: relative;
            margin: 0 auto 15px auto;
            width: 100%;
        }

        .password-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            padding: 12px;
            letter-spacing: 4px;
            font-family: monospace;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            border-radius: 0;
        }

        .password-input:focus {
            border-color: #ff69b4;
        }

        .hint {
            font-size: 0.75rem;
            color: #777;
            margin-top: 8px;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- MAIN VIEW GRID (MOBILE OPTIMIZED) --- */
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 5;
            padding: 10px 15px;
        }

        .container.show {
            opacity: 1;
        }

        /* High precision mobile layout ratios */
        .tree-container {
            width: 100%;
            height: 40dvh; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            position: relative;
        }

        .tree-container::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.12) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Extended box wrapper height to dynamically guard text lines */
        .message-box {
            width: 100%;
            max-width: 450px;
            height: 52dvh;
            padding: 10px 12px 30px 12px;
            font-size: 0.98rem;
            line-height: 1.65;
            font-weight: bold;
            text-align: left;
            word-wrap: break-word;
            overflow-y: auto; 
            scroll-behavior: smooth;
            scrollbar-width: none; 
            position: relative;
            z-index: 6;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .message-box::-webkit-scrollbar {
            display: none; 
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #ff69b4;
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* 💻 LAPTOP / DESKTOP VIEW ADJUSTMENTS */
        @media (min-width: 769px) {
            .container {
                flex-direction: row; 
                justify-content: space-around;
                padding: 50px;
            }

            .tree-container {
                width: 50%;
                height: 85dvh;
                margin-top: 0;
            }

            .message-box {
                width: 45%;
                height: auto;
                font-size: 1.3rem;
                line-height: 1.7;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <!-- Ambient Floating Hearts Overlay -->
        <div class="ambient-bg" id="ambientBg"></div>

        <!-- Lock Screen Screen Component -->
        <div id="lockScreen">
            <div class="lock-content">
                <h2>ENTER THE PASSWORD TO UNLOCK<br>YOUR BIRTHDAY GIFT 🎁</h2>
                <div class="input-wrapper">
                    <input type="password" inputmode="numeric" id="passwordField" class="password-input" placeholder="••••••••" maxlength="8" autocomplete="off">
                    <div class="hint">Hint: date of birth (DDMMYYYY)</div>
                </div>
                <div id="errorField" class="error-msg">Incorrect password, try 27062010 as password ❤️</div>
            </div>
        </div>

        <!-- Main Workspace Components -->
        <div class="container" id="mainCard">
            <div class="tree-container">
                <canvas id="treeCanvas"></canvas>
            </div>

            <div class="message-box" id="messageBox">
                <span id="text"></span><span class="cursor">&nbsp;</span>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_DOB = "27062010"; 

        const lockScreen = document.getElementById('lockScreen');
        const passwordField = document.getElementById('passwordField');
        const errorField = document.getElementById('errorField');
        const mainCard = document.getElementById('mainCard');
        const ambientBg = document.getElementById('ambientBg');
        
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const textElement = document.getElementById('text');
        const messageBox = document.getElementById('messageBox');

        const width = 500;
        const height = 600;
        canvas.width = width;
        canvas.height = height;

        // Custom code array housing the updated multi-emoji paragraph script
        const messageLines = [
            "Happiest Birthday, Aanya! 🎂🎉✨\n\n",
            "Wishing you a day filled with endless happiness, laughter, and pure joy! 🌸💫\n\n",
            "You are genuinely the most beautiful soul and a truly great person by heart ❤️, aur sach kahu toh, mere pass words nahi hai batane ke liye that how much you are special to me. 🥰💞\n\n",
            "I am incredibly lucky and absolutely delighted to have you in my life... honestly, having you as a friend has been one of the absolute best things that has ever happened to me! 🪐✨\n\n",
            "On your special day, I just want to wish you the most magical birthday ever—exactly the way your heart desires. 🌟🔮 May that priceless, beautiful smile of yours never fade away. 😊💕\n\n",
            "I’ve always cherished our bonding more than anything else in this world, aur tumse baat kiye bina mera toh din bhi poora nahi hota. 🥺⏳\n\n",
            "Waise, mujhe tumhe thoda tease karne ki aur tumhari sweet baatein sunne ki pyaari si aadat ho gayi hai, so get used to it because you are permanently stuck with me now! 😜💞\n\n",
            "May God bless you, protect you, and serve you with everything you ever dream of, with unmatched abundance, success, and growth. 👑🚀\n\n",
            "Keep rising, shining, and illuminating my entire world just by being in it. 🕊️✨\n\n",
            "With endless love, deepest respect, and a heart full of gratitude... Happy Birthday once again, my absolute favorite human! ❤️🌹🔒"
        ];

        const hearts = [];
        const fallingHearts = []; 
        let isUnlocked = false;

        const heartColors = [
            'rgba(255, 105, 180, ', 'rgba(255, 20, 147, ', 'rgba(255, 192, 203, ',
            'rgba(255, 69, 0, ', 'rgba(255, 165, 0, ', 'rgba(219, 112, 147, '
        ];

        let mouse = { x: null, y: null };

        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            mouse.x = ((clientX - rect.left) / rect.width) * width;
            mouse.y = ((clientY - rect.top) / rect.height) * height;
        }

        window.addEventListener('mousemove', getCanvasMousePos);
        window.addEventListener('touchmove', getCanvasMousePos, { passive: true });
        
        const resetMouse = () => { mouse.x = null; mouse.y = null; };
        window.addEventListener('mouseleave', resetMouse);
        window.addEventListener('touchend', resetMouse);

        /* Background Spawning Processor for Ambient Floating Effects */
        function spawnAmbientBackgroundHeart() {
            if(!isUnlocked) return;
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 12 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 4 + 5) + 's';
            heart.style.setProperty('--wobble', (Math.random() * 80 - 40) + 'px');
            
            ambientBg.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }

        function drawHeart(ctx, x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x - size / 2, y - size / 2, x - size, y + size / 3, x, y + size);
            ctx.bezierCurveTo(x + size, y + size / 3, x + size / 2, y - size / 2, x, y);
            ctx.fill();
        }

        function initHearts() {
            for (let i = 0; i < 460; i++) {
                const t = Math.PI * 2 * Math.random();
                const scaleX = 11.0;
                const scaleY = -10.0; 
                
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                const densityFactor = Math.random();
                hx *= densityFactor * scaleX;
                hy *= densityFactor * scaleY;

                const targetX = (width / 2) + hx + (Math.random() * 16 - 8);
                const targetY = (height / 2 - 50) + hy + (Math.random() * 16 - 8);

                hearts.push({
                    targetX: targetX,
                    targetY: targetY,
                    x: width / 2,
                    y: height - 180,
                    size: Math.random() * 6.5 + 5.5,
                    color: heartColors[Math.floor(Math.random() * heartColors.length)],
                    alpha: Math.random() * 0.4 + 0.6,
                    speed: Math.random() * 0.025 + 0.01,
                    angle: Math.random() * Math.PI,
                    offsetX: 0,
                    offsetY: 0,
                    growth: 0 
                });
            }
        }

        function animateTree() {
            ctx.clearRect(0, 0, width, height);

            ctx.fillStyle = '#ffb3c1'; 
            ctx.beginPath();
            ctx.moveTo(width / 2 - 9, height);
            ctx.quadraticCurveTo(width / 2 - 6, height - 100, width / 2 - 3, height - 180);
            ctx.lineTo(width / 2 + 3, height - 180);
            ctx.quadraticCurveTo(width / 2 + 6, height - 100, width / 2 + 9, height);
            ctx.closePath();
            ctx.fill();

            for (let i = 0; i < hearts.length; i++) {
                const p = hearts[i];
                p.angle += p.speed;

                if (isUnlocked) {
                    p.x += (p.targetX - p.x) * 0.05;
                    p.y += (p.targetY - p.y) * 0.05;
                    if (p.growth < 1) p.growth += 0.02;

                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = p.x - mouse.x;
                        const dy = p.y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxDist = 75; 

                        if (dist < maxDist) {
                            const force = (maxDist - dist) / maxDist;
                            p.offsetX += (dx / dist) * force * 3.5 - p.offsetX * 0.1;
                            p.offsetY += (dy / dist) * force * 3.5 - p.offsetY * 0.1;
                        } else {
                            p.offsetX *= 0.92;
                            p.offsetY *= 0.92;
                        }
                    } else {
                        p.offsetX *= 0.92;
                        p.offsetY *= 0.92;
                    }
                } else {
                    p.x += (p.targetX - p.x) * 0.05;
                    p.y += (p.targetY - p.y) * 0.05;
                    if (p.growth < 1) p.growth += 0.02;
                    p.offsetX = Math.sin(p.angle * 0.5) * 1.5;
                    p.offsetY = Math.cos(p.angle * 0.5) * 0.8;
                }

                const dynamicSize = (p.size + Math.sin(p.angle) * 1.2) * p.growth;
                const currentAlpha = p.alpha + Math.sin(p.angle) * 0.08;

                ctx.fillStyle = p.color + currentAlpha + ')';
                drawHeart(ctx, p.x + p.offsetX, p.y + p.offsetY, dynamicSize);

                if (isUnlocked && p.growth >= 1 && Math.random() < 0.0005 && fallingHearts.length < 20) {
                    fallingHearts.push({
                        x: p.x + p.offsetX,
                        y: p.y + p.offsetY,
                        size: p.size * 0.65,
                        color: p.color,
                        alpha: p.alpha,
                        velX: -Math.random() * 1.2 - 0.4, 
                        velY: Math.random() * 0.8 + 0.4,
                        wobbleSpeed: Math.random() * 0.04 + 0.02,
                        wobble: Math.random() * Math.PI
                    });
                }
            }

            for (let i = fallingHearts.length - 1; i >= 0; i--) {
                const fh = fallingHearts[i];
                fh.wobble += fh.wobbleSpeed;
                fh.x += fh.velX + Math.sin(fh.wobble) * 0.4;
                fh.y += fh.velY;
                fh.alpha -= 0.005;

                if (fh.alpha <= 0 || fh.y > height || fh.x < 0) {
                    fallingHearts.splice(i, 1);
                } else {
                    ctx.fillStyle = fh.color + fh.alpha + ')';
                    drawHeart(ctx, fh.x, fh.y, fh.size);
                }
            }

            requestAnimationFrame(animateTree);
        }

        function startTyping(textArray, charIndex = 0, lineIndex = 0) {
            if (lineIndex < textArray.length) {
                let currentLine = textArray[lineIndex];
                
                if (charIndex < currentLine.length) {
                    const char = currentLine.codePointAt(charIndex) > 0xffff ? currentLine.substr(charIndex, 2) : currentLine[charIndex];
                    textElement.innerHTML += (char === '\n') ? '<br>' : char;
                    
                    // Hands-free custom scroll tracker tracking cursor line drops
                    messageBox.scrollTop = messageBox.scrollHeight;

                    setTimeout(() => {
                        startTyping(textArray, charIndex + char.length, lineIndex);
                    }, 55); 
                } else {
                    setTimeout(() => {
                        startTyping(textArray, 0, lineIndex + 1);
                    }, 400);
                }
            }
        }

        passwordField.addEventListener('input', () => {
            errorField.style.opacity = '0';
            
            if (passwordField.value.length === 8) {
                if (passwordField.value === CORRECT_DOB) {
                    isUnlocked = true; 
                    lockScreen.classList.add('hide');
                    mainCard.classList.add('show');
                    
                    // Fire off background floating engine ticks
                    setInterval(spawnAmbientBackgroundHeart, 400);
                    
                    setTimeout(() => {
                        startTyping(messageLines);
                    }, 600);
                } else {
                    errorField.style.opacity = '1';
                    passwordField.value = '';
                }
            }
        });

        initHearts();
        animateTree();
    </script>
</body>
</html>
